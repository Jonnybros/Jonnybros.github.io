<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Discord Theme Colors */
        body { background-color: #313338; color: #dbdee1; font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* Category Navigation Bar */
        .category-bar { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; }
        .cat-btn { 
            background-color: #2b2d31; color: #949ba4; border: none; padding: 8px 16px; 
            border-radius: 20px; cursor: pointer; white-space: nowrap; font-weight: bold;
        }
        .cat-btn:hover, .cat-btn.active { background-color: #5865f2; color: white; }

        /* Item Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
        .card { background-color: #2b2d31; padding: 12px; border-radius: 8px; border: 1px solid #1e1f22; display: block; }
        .card img { width: 100%; border-radius: 4px; margin-bottom: 8px; background: #1e1f22; height: 100px; object-fit: cover; }
        h3 { margin: 5px 0; font-size: 16px; color: white; }
        .price { color: #23a55a; font-weight: bold; margin: 5px 0; }
        .btn { background-color: #5865f2; color: white; padding: 8px; border: none; border-radius: 3px; cursor: pointer; width: 100%; font-weight: bold; }

        /* Hidden Items logic */
        .card.hidden { display: none; }
    </style>
</head>
<body>

<header style="text-align: center; margin-bottom: 20px;">
    <h1 style="color:white;">🎒 School Marketplace</h1>
</header>

<!-- Category Filter Buttons -->
<div class="category-bar">
    <button class="cat-btn active" onclick="filterItems('all', this)">All Items</button>
    <button class="cat-btn" onclick="filterItems('chips', this)">🍟 Chips</button>
    <button class="cat-btn" onclick="filterItems('soda', this)">🥤 Soda</button>
    <button class="cat-btn" onclick="filterItems('fidgets', this)">🕹️ Fidgets</button>
</div>

<div class="grid" id="productGrid">
    <!-- CHIPS ITEMS -->
    <div class="card" data-category="chips">
        <img src="chips-photo.jpg" alt="Chips">
        <h3>Hot Cheetos</h3>
        <p class="price">$1.50</p>
        <button class="btn" onclick="handleBuy()">Reserve</button>
    </div>

    <!-- SODA ITEMS -->
    <div class="card" data-category="soda">
        <img src="soda-photo.jpg" alt="Soda">
        <h3>Sprite Can</h3>
        <p class="price">$1.00</p>
        <button class="btn" onclick="handleBuy()">Reserve</button>
    </div>

    <!-- FIDGET ITEMS -->
    <div class="card" data-category="fidgets">
        <img src="fidget-photo.jpg" alt="Fidget">
        <h3>Pop-It Spinner</h3>
        <p class="price">$3.00</p>
        <button class="btn" onclick="handleBuy()">Reserve</button>
    </div>
</div>

<script>
    // Filtering Logic
    function filterItems(category, btn) {
        // Update active button color
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Filter cards
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            if (category === 'all' || card.getAttribute('data-category') === category) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });
    }

    function handleBuy() {
        alert("Meeting spot: Library Entrance during 1st Lunch. Bring cash!");
    }
</script>

</body>
</html>
