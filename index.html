<script>
/* ✅ Your Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyBZTGndL235B-c6mYft3mblBz6eN4vqRLM",
  authDomain: "school-market-42bf2.firebaseapp.com",
  databaseURL: "https://school-market-42bf2-default-rtdb.firebaseio.com",
  projectId: "school-market-42bf2",
  storageBucket: "school-market-42bf2.firebasestorage.app",
  messagingSenderId: "849244125573",
  appId: "1:849244125573:web:cca81082d1204de4db6cec"
};

let db = null;

/* ✅ INIT FIREBASE */
window.onload = function () {
    try {
        // Initialize using the global 'firebase' object from the script tags
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.database();

        document.getElementById("status").innerText = "✅ Connected!";
        document.getElementById("status").style.color = "lime";

        // Check if user is already logged in
        const savedUser = localStorage.getItem("user");
        if (savedUser) {
            document.getElementById("authModal").style.display = "none";
            document.getElementById("navUser").innerText = savedUser;
        }

    } catch (e) {
        document.getElementById("status").innerText = "❌ Connection Error";
        document.getElementById("status").style.color = "red";
        console.error("Firebase Error:", e);
    }
};

/* ✅ LOGIN */
function handleAuth() {
    const u = document.getElementById("userInput").value;
    const p = document.getElementById("passInput").value;
    
    if (!u || !p) return alert("Enter username and password");

    localStorage.setItem("user", u);
    localStorage.setItem("pass", p); // Saving locally for this version
    document.getElementById("authModal").style.display = "none";
    document.getElementById("navUser").innerText = u;
}

/* ✅ PROMOTE (Saves to Online Database) */
function promoteSelf() {
    const u = localStorage.getItem("user");

    if (!u) return alert("Not logged in");
    if (!db) return alert("Database not connected yet");

    db.ref("users/" + u).update({ 
        seller: true,
        status: "Active Seller" 
    })
    .then(() => alert("✅ You are now a seller in the online database!"))
    .catch(err => alert("❌ Database Error: " + err.message));
}

/* ✅ PAGE SWITCH */
function showPage(id) {
    document.querySelectorAll(".category-view").forEach(el => el.classList.remove("active"));
    document.getElementById(id).classList.add('active');
}
</script>
