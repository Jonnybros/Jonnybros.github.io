<script>
    // SETTINGS & DATABASE
    const SHOP_ITEMS = ["Coca Cola", "Diet Coke", "Monster Energy", "Doritos Cool Ranch", "Takis", "Hot Fries", "Lays Classic", "Barbeque", "Keyboard Fidgets", "Poppets", "Clickers"];
    const emojis = "😈💀💩👹🤬😡🤑😱😀😁😆🥹😅😂🤣🥲☺️😊😇🙂🙃😉😌".match(/./gu);
    let isRegistering = false;

    // 1. DATA PERSISTENCE CHECK (Runs on Page Load)
    window.onload = () => {
        const session = localStorage.getItem('session_active');
        const user = localStorage.getItem('reg_user');

        if (session !== 'true' || !user) {
            document.getElementById('authModal').style.display = 'flex';
        } else {
            loadUserSession();
        }
        setupEmojis();
    };

    function loadUserSession() {
        const u = localStorage.getItem('reg_user');
        const p = localStorage.getItem('reg_pass');
        
        document.getElementById('navUser').innerText = u;
        document.getElementById('drawerUser').innerText = u;
        
        // SECURE ADMIN CHECK: Both name AND password must match
        if (u.toLowerCase() === "jonny" && p === "Jonny678!") {
            document.getElementById('adminSection').style.display = 'block';
        }
        
        // PERSISTENT SELLER CHECK: Stays active after updates
        if (localStorage.getItem('is_seller') === 'true') {
            document.getElementById('sellerTab').style.display = 'block';
            setupSellerSlots(localStorage.getItem('seller_tier'));
        }
    }

    // 2. AUTH LOGIC (Login/Register)
    function handleAuth() {
        const u = document.getElementById('userInput').value.trim();
        const p = document.getElementById('passInput').value.trim();

        if (!u || !p) return alert("Fill in both fields!");

        if (isRegistering) {
            // New Account: Save permanently
            localStorage.setItem('reg_user', u);
            localStorage.setItem('reg_pass', p);
            localStorage.setItem('session_active', 'true');
            location.reload();
        } else {
            // Login: Check against permanent save
            const savedU = localStorage.getItem('reg_user');
            const savedP = localStorage.getItem('reg_pass');
            if (u === savedU && p === savedP) {
                localStorage.setItem('session_active', 'true');
                location.reload();
            } else {
                alert("Incorrect login. Use the iPad you registered on!");
            }
        }
    }

    // 3. SELLER LOGIC
    function promotePrompt() {
        const tier = prompt("Enter Tier (1, 2, 3, max):");
        // This generates the link for the OTHER person's iPad
        const link = window.location.origin + window.location.pathname + "?role=seller&tier=" + tier;
        alert("SHARE THIS LINK WITH THE SELLER:\n\n" + link);
    }

    function setupSellerSlots(tier) {
        const container = document.getElementById('slotContainer');
        container.innerHTML = ""; // Clear old slots
        let count = (tier === '1') ? 2 : (tier === '2') ? 5 : (tier === '3') ? 10 : 20;
        
        for(let i=1; i<=count; i++) {
            container.innerHTML += `
                <div class="slot-card">
                    <small style="color:#949ba4">Slot ${i}</small>
                    <select style="margin-top:8px; padding:5px; font-size:12px; width:100%; background:#313338; color:white; border:none; border-radius:4px;">
                        <option>Empty</option>
                        ${SHOP_ITEMS.map(it => `<option>${it}</option>`).join('')}
                    </select>
                </div>`;
        }
    }

    // 4. UI LOGIC
    function toggleAuthMode() { 
        isRegistering = !isRegistering; 
        document.getElementById('authTitle').innerText = isRegistering ? "Register" : "Login"; 
    }

    function toggleDrawer() { 
        document.getElementById('drawer').classList.toggle('open'); 
    }

    function signOut() {
        // Only flip the session. DO NOT clear() or removeItem('reg_user')!
        localStorage.setItem('session_active', 'false'); 
        location.reload(); 
    }

    function setupEmojis() {
        const p = document.getElementById('emojiPicker');
        const savedEmoji = localStorage.getItem('m_emoji') || '👤';
        document.getElementById('navEmoji').innerText = savedEmoji;
        document.getElementById('drawerEmoji').innerText = savedEmoji;

        if (p.children.length === 0) { // Prevent duplicates on refresh
            emojis.forEach(e => {
                let s = document.createElement('span'); s.innerText = e; s.style.cursor="pointer";
                s.onclick = () => { 
                    localStorage.setItem('m_emoji', e);
                    document.getElementById('navEmoji').innerText=e; 
                    document.getElementById('drawerEmoji').innerText=e; 
                };
                p.appendChild(s);
            });
        }
    }

    function showTab(id, btn) {
        document.querySelectorAll('.category-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
</script>
