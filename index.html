<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>School Marketplace</title>
    <style>
        :root {
            --bg-dark: #313338; --bg-secondary: #2b2d31; --bg-tertiary: #1e1f22;
            --blurple: #5865f2; --text: #dbdee1; --danger: #da373c; --success: #23a55a;
        }

        body { background-color: var(--bg-dark); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- DISCORD MODALS --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background-color: var(--bg-secondary); padding: 30px; border-radius: 8px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .modal-box label { display: block; text-align: left; font-size: 12px; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; color: #b5bac1; }

        /* --- UI ELEMENTS --- */
        .top-nav { background: var(--bg-secondary); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
        .search-box { background: var(--bg-tertiary); border-radius: 4px; padding: 6px 12px; flex-grow: 1; margin: 0 15px; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }
        .main-container { display: flex; flex-grow: 1; overflow: hidden; }
        .menu-sidebar { width: 240px; background: var(--bg-secondary); padding: 15px 10px; display: flex; flex-direction: column; gap: 8px; }
        .menu-item { text-decoration: none; color: #949ba4; padding: 10px; border-radius: 4px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .menu-item:hover { background: #3f4147; color: white; }
        
        .drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: #232428; z-index: 201; transition: 0.3s ease; padding: 30px 15px; box-sizing: border-box; overflow-y: auto; }
        .drawer.open { right: 0; }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-height: 150px; overflow-y: auto; background: var(--bg-tertiary); padding: 8px; border-radius: 6px; margin: 10px 0; }
        
        .btn { background: var(--blurple); color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; background: var(--bg-tertiary); border: none; color: white; margin-bottom: 15px; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

    <!-- 1. AUTH MODAL (Login/Register) -->
    <div id="authModal" class="modal-overlay">
        <div class="modal-box">
            <h2 id="authTitle" style="color:white; margin-top:0;">Welcome Back</h2>
            <label>Username</label>
            <input type="text" id="userInput">
            <label>Password</label>
            <input type="password" id="passInput">
            <button class="btn" onclick="handleAuth()">Log In</button>
            <p style="margin-top:15px; font-size:14px; color:#b5bac1;">
                <span id="toggleText">Need an account?</span> 
                <a href="#" onclick="toggleAuthMode()" style="color:#00a8fc; text-decoration:none;">Register</a>
            </p>
        </div>
    </div>

    <!-- 2. ADMIN PROMOTION MODAL (In-Site instead of Chrome Pop-up) -->
    <div id="promoteModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="color:white; margin-top:0;">Promote User</h2>
            <input type="text" id="promoUser" placeholder="Target Username">
            <select id="promoTier" style="width:100%; padding:10px; background:var(--bg-tertiary); color:white; border:none; margin-bottom:15px;">
                <option value="1">Tier 1 (2 slots)</option>
                <option value="2">Tier 2 (5 slots)</option>
                <option value="3">Tier 3 (10 slots)</option>
                <option value="max">Max Tier (20 slots)</option>
            </select>
            <button class="btn" onclick="generatePromoLink()">Generate Link</button>
            <button class="btn" style="background:#4e5058;" onclick="closePromote()">Cancel</button>
        </div>
    </div>

    <nav class="top-nav">
        <div style="font-weight:bold; color:white;">🎒 MARKET</div>
        <div class="search-box"><input type="text" placeholder="Search items or people..."></div>
        <div onclick="toggleDrawer()" style="cursor:pointer; display:flex; align-items:center; gap:8px;">
            <div id="navUser" style="font-size:12px; font-weight:bold;">Guest</div>
            <div id="navEmoji" style="background:var(--blurple); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;">👤</div>
        </div>
    </nav>

    <div class="main-container">
        <div class="menu-sidebar">
            <a href="chips.html" class="menu-item"><span>🍟</span> CHIPS</a>
            <a href="soda.html" class="menu-item"><span>🥤</span> SODA</a>
            <a href="fidgets.html" class="menu-item"><span>🕹️</span> FIDGETS</a>
        </div>
        <div style="flex-grow:1; display:flex; align-items:center; justify-content:center; text-align:center;">
            <h1 style="color:white;"># school-marketplace</h1>
        </div>
    </div>

    <div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:200;" onclick="toggleDrawer()"></div>
    <div id="drawer" class="drawer">
        <div style="text-align:center;">
            <div id="drawerEmoji" style="font-size:40px; margin:0 auto 10px; background:var(--blurple); width:70px; height:70px; border-radius:50%; display:flex; align-items:center; justify-content:center;">👤</div>
            <h2 id="drawerUser" style="color:white; margin:0;">Guest</h2>
            <div id="emojiPicker" class="emoji-grid"></div>
            
            <div id="adminSection" style="display:none; margin-top:20px; border-top:1px solid #3f4147; padding-top:10px;">
                <p style="color:var(--success); font-size:11px; font-weight:bold;">👑 ADMIN TOOLS</p>
                <button class="btn" style="background:var(--success);" onclick="openPromote()">Promote Seller</button>
            </div>
            
            <button class="btn" style="background:var(--danger);" onclick="signOut()">Log Out</button>
        </div>
    </div>

    <script>
        const emojis = "😈💀💩👹🤬😡🤑😱😀😁😆🥹😅😂🤣🥲☺️😊😇🙂🙃😉😌😗😙😚😭😢😖🫡🫢🤭🫣🥴🤢🤮🤧😷🤒🤕🤐🐶🐱🐭🐹🐰🦊🐻🐼🐻‍❄️🐨🐯🦁🐮🐷🐽🐸🐵🙈🙉🙊🐒🐔🐧🐦🐤🐣🕸️🕷️🦗🦟🪳🪲🪰🐜🐞🐌🦋🐛🪱🐝🫎🦄🐴🐗🐺🦇🦉🦅🐦‍⬛🦆🪿🐥💫⭐🌟✨⚡️☄️💥🔥🌈☃️⛄🌬️🍏⚽🏀🏈⚾🥎🎾🏐🏉🥏🎱🪀🏓🏸🏒🏑🥍🏏🪃🥅⛳🪁🛝🏹🎣🤿🥊📱📲💻⌨️🖥️🖨️🖱️🖲️🕹️🗜️💽💾🧻🗯️".match(/./gu);
        let isRegistering = false;

        window.onload = () => { checkAuth(); setupEmojis(); };

        function toggleAuthMode() {
            isRegistering = !isRegistering;
            document.getElementById('authTitle').innerText = isRegistering ? "Create Account" : "Welcome Back";
        }

        function handleAuth() {
            const u = document.getElementById('userInput').value.trim();
            const p = document.getElementById('passInput').value.trim();
            if(!u || !p) return alert("Fill all fields!");

            if(isRegistering) {
                localStorage.setItem('reg_user', u);
                localStorage.setItem('reg_pass', p);
                localStorage.setItem('session_active', 'true');
                location.reload();
            } else {
                if(u === localStorage.getItem('reg_user') && p === localStorage.getItem('reg_pass')) {
                    localStorage.setItem('session_active', 'true');
                    location.reload();
                } else { alert("Wrong username/password!"); }
            }
        }

        function checkAuth() {
            if(localStorage.getItem('session_active') !== 'true') {
                document.getElementById('authModal').style.display = 'flex';
            } else {
                const u = localStorage.getItem('reg_user');
                document.getElementById('navUser').innerText = u;
                document.getElementById('drawerUser').innerText = u;
                if(u.toLowerCase() === "jonny") document.getElementById('adminSection').style.display='block';
            }
        }

        function signOut() {
            localStorage.setItem('session_active', 'false'); // Log out without deleting the account
            location.reload();
        }

        function openPromote() { document.getElementById('promoteModal').style.display='flex'; }
        function closePromote() { document.getElementById('promoteModal').style.display='none'; }
        
        function generatePromoLink() {
            const target = document.getElementById('promoUser').value;
            const tier = document.getElementById('promoTier').value;
            const link = window.location.href + "?role=seller&tier=" + tier;
            alert("Link for " + target + ":\n" + link);
            closePromote();
        }

        function toggleDrawer() {
            const d = document.getElementById('drawer');
            const o = document.getElementById('overlay');
            d.classList.toggle('open');
            o.style.display = d.classList.contains('open') ? 'block' : 'none';
        }

        function setupEmojis() {
            const p = document.getElementById('emojiPicker');
            emojis.forEach(e => {
                let s = document.createElement('span'); s.innerText = e; s.style.cursor="pointer";
                s.onclick = () => { 
                    document.getElementById('navEmoji').innerText = e; 
                    document.getElementById('drawerEmoji').innerText = e;
                };
                p.appendChild(s);
            });
        }
    </script>
</body>
</html>
