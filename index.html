<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Marketplace</title>
    <style>
        /* Discord Theme Colors */
        body { 
            background-color: #313338; 
            color: #dbdee1; 
            font-family: 'gg sans', 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh;
        }

        h1 { color: white; margin-bottom: 40px; font-size: 32px; }

        /* Centered Box Container */
        .category-container { 
            display: flex; 
            gap: 24px; 
            flex-wrap: wrap; 
            justify-content: center; 
            width: 95%;
            max-width: 1000px;
        }

        /* Large Category Boxes */
        .cat-box { 
            background-color: #2b2d31; 
            width: 280px; 
            height: 280px; 
            border-radius: 16px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            border: 2px solid transparent;
            text-decoration: none;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Hover and Tap Effects */
        .cat-box:hover { 
            background-color: #35373c; 
            transform: translateY(-8px);
            border-color: #5865f2; /* Discord Blurple */
        }
        .cat-box:active { transform: scale(0.95); }

        .cat-icon { font-size: 80px; margin-bottom: 20px; }
        .cat-name { font-size: 26px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* Responsive Fix for small screens/Portrait Mode */
        @media (max-width: 600px) {
            .cat-box { width: 90%; height: 180px; flex-direction: row; gap: 30px; }
            body { height: auto; padding: 50px 0; }
        }
    </style>
</head>
<body>

    <h1># school-marketplace</h1>

    <div class="category-container">
        <!-- Chips Section -->
        <a href="chips.html" class="cat-box">
            <div class="cat-icon">🍟</div>
            <div class="cat-name">Chips</div>
        </a>

        <!-- Soda Section -->
        <a href="soda.html" class="cat-box">
            <div class="cat-icon">🥤</div>
            <div class="cat-name">Soda</div>
        </a>

        <!-- Fidgets Section -->
        <a href="fidgets.html" class="cat-box">
            <div class="cat-icon">🕹️</div>
            <div class="cat-name">Fidgets</div>
        </a>
    </div>

</body>
