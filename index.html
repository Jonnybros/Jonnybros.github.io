<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Discord Theme Colors */
        body { background-color: #313338; color: #dbdee1; font-family: sans-serif; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .card { background-color: #2b2d31; padding: 15px; border-radius: 8px; text-align: center; }
        .btn { background-color: #5865f2; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        
        /* The Popup (Modal) */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { 
            background-color: #313338; padding: 32px; border-radius: 8px; width: 90%; max-width: 400px; 
            text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        input { width: 100%; padding: 10px; background: #1e1f22; border: none; border-radius: 3px; color: white; margin: 10px 0; box-sizing: border-box; }
        .close-btn { color: #949ba4; cursor: pointer; margin-top: 10px; display: block; font-size: 12px; }
    </style>
</head>
<body>

<h1>🎒 School Shop</h1>
<div class="grid">
    <div class="card">
        <h3>Mechanical Pencil</h3>
        <p>$1.00</p>
        <button class="btn" onclick="handleBuy()">Reserve & Meet</button>
    </div>
</div>

<!-- Discord-Themed Popup -->
<div id="authModal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color:white; margin-top:0;">Create Account</h2>
        <p style="color:#b5bac1; font-size:14px;">You must have an account to buy items!</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn" onclick="finishSignup()">Sign Up</button>
        <a class="close-btn" onclick="closeModal()">Maybe later</a>
    </div>
</div>

<script>
    // 1. Check if they already have an "account"
    function handleBuy() {
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        if (isLoggedIn) {
            alert("Reserved! Meet the seller at the Blue Benches.");
            // Here you could send data to a Google Sheet if you wanted
        } else {
            document.getElementById('authModal').style.display = 'flex';
        }
    }

    // 2. "Create" the account instantly
    function finishSignup() {
        const user = document.getElementById('username').value;
        if (user.length > 2) {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', user);
            alert("Account created! You can now buy items.");
            closeModal();
        } else {
            alert("Please enter a username.");
        }
    }

    function closeModal() {
        document.getElementById('authModal').style.display = 'none';
    }
</script>

</body>
</html>
