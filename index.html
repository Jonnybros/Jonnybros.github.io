<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Marketplace</title>
    
    <!-- 1. LOAD FIREBASE (These links MUST be exact) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body { background-color: #313338; color: #dbdee1; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background-color: #2b2d31; padding: 25px; border-radius: 8px; width: 300px; text-align: center; }
        .top-nav { background: #2b2d31; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
        .menu-sidebar { width: 220px; background: #2b2d31; padding: 15px; }
        .content-area { flex-grow: 1; padding: 20px; text-align: center; }
        .btn { background: #5865f2; color: white; border: none; padding: 10px; width: 100%; margin-top: 10px; cursor: pointer; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; background: #1e1f22; border: none; color: white; }
        .category-view { display: none; } .category-view.active { display: block; }
    </style>
</head>
<body>

    <!-- LOGIN BOX -->
    <div id="authModal" class="modal-overlay" style="display:flex;">
        <div class="modal-box">
            <h2>Welcome</h2>
            <input type="text" id="userInput" placeholder="Username">
            <input type="password" id="passInput" placeholder="Password">
            <button class="btn" onclick="handleAuth()">Log In</button>
            <p id="status" style="color:orange; font-size:12px; margin-top:10px;">Connecting...</p>
        </div>
    </div>

    <nav class="top-nav">
        <div style="font-weight:bold; color:white;">🎒 MARKET</div>
        <div id="navUser">Guest</div>
    </nav>

    <div style="display:flex; height:100%;">
        <div class="menu-sidebar">
            <div onclick="show('home')" style="cursor:pointer; padding:10px;">🏠 Home</div>
            <div onclick="show('seller')" style="cursor:pointer; padding:10px; color:#23a55a;">🛠️ Seller</div>
        </div>
        <div class="content-area">
            <div id="home" class="category-view active"><h1># marketplace</h1></div>
            <div id="seller" class="category-view">
                <h2>Seller Dashboard</h2>
                <button class="btn" onclick="promoteSelf()">Promote Me (Admin)</button>
            </div>
        </div>
    </div>

    <script>
        // 2. YOUR CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyBZTGndL235B-c6mYft3mblBz6eN4vqRLM",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "school-market-42bf2",
            storageBucket: "school-market-42bf2.firebasestorage.app",
            messagingSenderId: "849244125573",
            appId: "1:849244125573:web:cca81082d1204de4db6cec"
        };

        // 3. START FIREBASE
        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            document.getElementById('status').innerText = "Online & Ready!";
            document.getElementById('status').style.color = "#23a55a";
        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = "Error: " + error.message;
        }

        // 4. APP LOGIC
        function handleAuth() {
            const u = document.getElementById('userInput').value;
            if(u) {
                localStorage.setItem('user', u);
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('navUser').innerText = u;
            }
        }

        function promoteSelf() {
            const u = localStorage.getItem('user');
            if (u && db) {
                db.ref('users/' + u).update({ is_seller: true });
                alert("You are now a seller!");
            }
        }

        function show(id) {
            document.querySelectorAll('.category-view').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.onload = () => {
            if(localStorage.getItem('user')) {
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('navUser').innerText = localStorage.getItem('user');
            }
        };
    </script>
</body>
</html>
