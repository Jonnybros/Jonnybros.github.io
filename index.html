<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Marketplace</title>
    <style>
        /* Discord Theme Colors */
        body { background-color: #313338; color: #dbdee1; font-family: 'gg sans', sans-serif; margin: 0; overflow-x: hidden; }

        /* Top Nav */
        .top-nav {
            width: 100%; background-color: #2b2d31; padding: 10px 20px;
            display: flex; align-items: center; justify-content: space-between;
            position: fixed; top: 0; z-index: 100; box-sizing: border-box;
        }

        .user-profile { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-photo { width: 35px; height: 35px; background-color: #5865f2; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* Slide-Over Window (Drawer) */
        .drawer-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 200;
        }
        .drawer {
            position: fixed; top: 0; right: -300px; width: 280px; height: 100%;
            background-color: #232428; z-index: 201; transition: 0.3s ease;
            padding: 40px 20px; box-sizing: border-box; box-shadow: -5px 0 15px rgba(0,0,0,0.3);
        }
        .drawer.open { right: 0; }

        /* Drawer Content */
        .drawer-header { text-align: center; margin-bottom: 30px; }
        .big-avatar { width: 80px; height: 80px; background: #5865f2; border-radius: 50%; font-size: 40px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
        .logout-btn {
            width: 100%; background-color: #da373c; color: white; border: none;
            padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        /* Category Boxes */
        .content { margin-top: 100px; text-align: center; }
        .category-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .cat-box { 
            background-color: #2b2d31; width: 250px; height: 250px; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-decoration: none; color: white; transition: 0.2s; border: 2px solid transparent;
        }
        .cat-box:hover { border-color: #5865f2; }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <div style="font-weight:bold; color:white;">🎒 Shop</div>
        <div class="user-profile" onclick="toggleDrawer()">
            <div id="navUser" style="font-size:14px; font-weight:bold;">Guest</div>
            <div class="user-photo" id="navEmoji">👤</div>
        </div>
    </nav>

    <!-- Slide-Over Drawer -->
    <div id="overlay" class="drawer-overlay" onclick="toggleDrawer()"></div>
    <div id="drawer" class="drawer">
        <div class="drawer-header">
            <div class="big-avatar" id="drawerEmoji">👤</div>
            <h2 id="drawerUser" style="color:white; margin:10px 0 5px;">Guest</h2>
            <p style="color:#b5bac1; font-size:14px;">School Member</p>
        </div>
        <hr style="border: 0; border-top: 1px solid #3f4147;">
        <button class="logout-btn" onclick="signOut()">Sign Out</button>
    </div>

    <!-- Main Content -->
    <div class="content">
        <h1># school-marketplace</h1>
        <div class="category-container">
            <a href="chips.html" class="cat-box"><span>🍟</span><strong>CHIPS</strong></a>
            <a href="soda.html" class="cat-box"><span>🥤</span><strong>SODA</strong></a>
            <a href="fidgets.html" class="cat-box"><span>🕹️</span><strong>FIDGETS</strong></a>
        </div>
    </div>

    <script>
        // Load User Data
        function updateUI() {
            const user = localStorage.getItem('username') || "Guest";
            const emoji = localStorage.getItem('userEmoji') || "👤";
            document.getElementById('navUser').innerText = user;
            document.getElementById('drawerUser').innerText = user;
            document.getElementById('navEmoji').innerText = emoji;
            document.getElementById('drawerEmoji').innerText = emoji;
        }

        function toggleDrawer() {
            const drawer = document.getElementById('drawer');
            const overlay = document.getElementById('overlay');
            drawer.classList.toggle('open');
            overlay.style.display = drawer.classList.contains('open') ? 'block' : 'none';
        }

        function signOut() {
            localStorage.clear(); // Clears user data
            alert("Signed out! Please log back in.");
            location.reload(); // Refresh to trigger sign-up popup
        }

        window.onload = updateUI;
    </script>
</body>
</html>
