<script>
  // PASTE YOUR CONFIG HERE (The one you copied in Step 1)

    apiKey: "YOUR_API_KEY",
    authDomain: "://firebaseapp.com",
    databaseURL: "https://firebaseio.com",
    projectId: "school-market-42bf2",
    storageBucket: "://appspot.com",
    messagingSenderId: "...",
    appId: "..."
  };

  // Connect to the online database
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Now, when Jonny promotes someone, we save it online:
  function promoteUser(targetUser, tier) {
      db.ref('users/' + targetUser).update({
          is_seller: true,
          seller_tier: tier
      });
      alert(targetUser + " is now a live Seller!");
  }
</script>
