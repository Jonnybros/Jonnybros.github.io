<script>
    // HARDCODED ADMIN
    const ADMIN_USER = "Jonny";
    
    // ITEM DATABASE
    const MARKET_ITEMS = [
        "Coca Cola", "Diet Coke", "Monster Energy", "Doritos Cool Ranch", 
        "Doritos Nachos", "Hot Fries", "Takis", "Lays Classic", 
        "Barbeque Lays", "Keyboard Fidget", "Poppets", "Clickers"
    ];

    window.onload = function() {
        checkAuth();
        const user = localStorage.getItem('m_user');
        
        // Show Admin Panel if user is Jonny
        if (user === ADMIN_USER) {
            document.getElementById('adminPanel').style.display = 'block';
        }
        
        // Check if user has "Seller" link (Simulated via URL)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('role') === 'seller') {
            document.getElementById('sellerMenu').style.display = 'block';
            setupSellerSlots(urlParams.get('tier'));
        }
    };

    function setupSellerSlots(tier) {
        let slots = 0;
        if (tier === '1') slots = 2;
        if (tier === '2') slots = 5;
        if (tier === '3') slots = 10;
        if (tier === 'max') slots = 20;

        const container = document.getElementById('slotContainer');
        for (let i = 1; i <= slots; i++) {
            container.innerHTML += `
                <div class="slot-card">
                    <h4>Slot ${i}</h4>
                    <select id="slot-${i}" onchange="updateMarket(${i})">
                        <option>Select Item...</option>
                        ${MARKET_ITEMS.map(item => `<option>${item}</option>`).join('')}
                    </select>
                </div>`;
        }
    }

    // Function for Jonny to "Promote"
    function promoteUser() {
        const target = prompt("Enter Username to Promote:");
        const tier = prompt("Enter Tier (1, 2, 3, or max):");
        const sellerLink = window.location.href + "?role=seller&tier=" + tier;
        
        // In a real app, you'd email this. Here, we'll just alert it.
        alert("Copy and send this link to " + target + " to give them Seller Status:\n\n" + sellerLink);
    }
</script>
<!-- Admin Panel (Only visible to Jonny) -->
<div id="adminPanel" style="display:none; background: #232428; padding: 20px; border: 1px solid var(--blurple);">
    <h3>Admin: Jonny's Command Center</h3>
    <button class="btn" onclick="promoteUser()">Promote User to Seller</button>
</div>

<!-- Seller Menu -->
<div id="sellerMenu" style="display:none; padding: 20px;">
    <h2>Your Seller Dashboard</h2>
    <div id="slotContainer" class="grid"></div>
    <hr>
    <h3>Add New Custom Item</h3>
    <a href="YOUR_GOOGLE_FORM_FOR_NEW_ITEMS" class="btn">Open Submission Form</a>
</div>
