<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #313338; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .login-card { background-color: #2b2d31; padding: 32px; border-radius: 8px; width: 100%; max-width: 400px; text-align: center; color: white; box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
        h2 { margin-bottom: 8px; font-size: 24px; }
        p { color: #b5bac1; margin-bottom: 20px; }
        label { display: block; text-align: left; color: #b5bac1; font-size: 12px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 10px; background-color: #1e1f22; border: none; border-radius: 3px; color: white; margin-bottom: 20px; box-sizing: border-box; }
        .login-btn { width: 100%; background-color: #5865f2; color: white; padding: 12px; border: none; border-radius: 3px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .login-btn:hover { background-color: #4752c4; }
        .register-link { font-size: 14px; margin-top: 15px; color: #b5bac1; }
        .register-link a { color: #00a8fc; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Welcome back!</h2>
        <p>We're so excited to see you again!</p>
        <form>
            <label>Email or Phone Number</label>
            <input type="text" required>
            <label>Password</label>
            <input type="password" required>
            <button type="submit" class="login-btn">Log In</button>
        </form>
        <div class="register-link">
            Need an account? <a href="YOUR_SIGNUP_LINK">Register</a>
        </div>
    </div>
</body>
</html>
<!-- Inside the login-card div -->
<div class="register-link">
    Need an account? <a href="register.html">Register</a>
</div>

<style>
    .register-link { 
        font-size: 14px; 
        margin-top: 15px; 
        color: #b5bac1; /* Discord's light gray text */
        text-align: left;
    }
    .register-link a { 
        color: #00a8fc; /* Discord's link blue */
        text-decoration: none; 
    }
    .register-link a:hover { 
        text-decoration: underline; 
    }
</style>
